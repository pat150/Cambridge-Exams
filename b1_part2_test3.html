<style>
  :root {
    --navy: #1a2744; --navy-mid: #243258; --gold: #c8973a; --gold-light: #e8b86d;

  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  main { max-width: 900px; margin: 0 auto; padding: 32px 24px 60px; }
  .screen { display: none; } .screen.active { display: block; }
  .entry-card { background: white; border-radius: var(--radius); border: 1px solid var(--cream-dark); padding: 40px; max-width: 480px; margin: 40px auto 0; box-shadow: 0 2px 16px rgba(26,39,68,0.07); }

  .field { margin-bottom: 20px; }

  .field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--cream-dark); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); background: var(--cream); transition: border-color 0.2s; outline: none; }
  .field input:focus { border-color: var(--navy); background: white; }

  .exam-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .meta-pill { background: var(--navy); color: white; font-size: 12px; font-weight: 600; letter-spacing: 0.6px; padding: 5px 12px; border-radius: 20px; }
  .meta-student { font-size: 13px; color: var(--text-muted); margin-left: auto; }
  .instructions-banner { background: var(--navy); color: white; border-radius: var(--radius); padding: 14px 18px; font-size: 13.5px; line-height: 1.5; margin-bottom: 4px; }
  .castles-box { background: white; border: 1px solid var(--cream-dark); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
  .castles-box h3 { font-family: 'Source Serif 4', serif; color: var(--navy); margin-bottom: 12px; }
  .castle-item { margin-bottom: 16px; }
  .castle-item strong { color: var(--gold); display: block; margin-bottom: 4px; }
  .question-card { background: white; border: 1px solid var(--cream-dark); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px; }
  .q-num-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .q-text { font-family: 'Source Serif 4', serif; font-size: 14.5px; line-height: 1.5; color: var(--text); margin-bottom: 12px; }
  .options-list { display: flex; flex-direction: column; gap: 6px; }
  .option-btn { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border: 1.5px solid var(--cream-dark); border-radius: var(--radius); background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13.5px; color: var(--text); transition: all 0.15s; text-align: left; line-height: 1.4; }
  .option-btn:hover { border-color: var(--navy); background: var(--cream); }
  .option-btn.selected { border-color: var(--navy); background: var(--navy); color: white; }
  .option-letter { font-weight: 700; font-size: 13px; min-width: 16px; flex-shrink: 0; margin-top: 1px; }
  .submit-row { display: flex; align-items: center; gap: 20px; margin-top: 8px; }
  .submit-row .btn-primary { width: auto; padding: 12px 32px; }
  .progress-note { font-size: 13px; color: var(--text-muted); }

  .score-num { font-family: 'Source Serif 4', serif; font-size: 34px; font-weight: 600; line-height: 1; }
  .score-denom { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .results-info h2 { font-family: 'Source Serif 4', serif; font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .results-info p { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 8px; }
  .pct { font-size: 28px; font-weight: 700; color: var(--gold-light); }
  .results-list { display: flex; flex-direction: column; gap: 8px; }
  .result-item { display: grid; grid-template-columns: 28px 1fr 28px; gap: 12px; align-items: start; padding: 12px 16px; border-radius: var(--radius); }

  .result-num { font-weight: 700; font-size: 14px; color: var(--navy); padding-top: 2px; }
